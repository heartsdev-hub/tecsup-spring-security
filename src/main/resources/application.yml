spring:
  datasource:
    url: jdbc:postgresql://localhost:5252/security-db
    driver-class-name: org.postgresql.Driver
    username: admin
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

security:
  jwt:

    secret: U2N1cml0eS1CYXNlbGluZS1KV1QtU2VjcmV0LUtleS0yMDI2LVNlY3VyZQ==
    expiration-ms: 3600000

logging:
  level:
    com.example.scurity: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.web: INFO
    org.springframework.security: DEBUG
