spring:
  datasource:
    url: jdbc:h2:mem:securitydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

security:
  jwt:
    secret: U2N1cml0eS1CYXNlbGluZS1KV1QtU2VjcmV0LUtleS0yMDI2LVNlY3VyZQ==
    expiration-ms: 60000
